version: '3.9'
services:
  order-db:
    image: postgres:16
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB: order_db
    ports:
      - "5433:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data

  payment-db:
    image: postgres:16
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data

  payment-service:
    build:
      context: ./payment-service
    environment:
      HTTP_ADDR: :8081
      DB_DSN: postgres://payment_user:payment_pass@payment-db:5432/payment_db?sslmode=disable
    depends_on:
      - payment-db
    ports:
      - "8081:8081"

  order-service:
    build:
      context: ./order-service
    environment:
      HTTP_ADDR: :8080
      DB_DSN: postgres://order_user:order_pass@order-db:5432/order_db?sslmode=disable
      PAYMENT_BASE_URL: http://payment-service:8081
      HTTP_TIMEOUT_SECONDS: 2
    depends_on:
      - order-db
      - payment-service
    ports:
      - "8080:8080"

volumes:
  order_db_data:
  payment_db_data:
