version: "3.9"

services:
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 110755
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 110755
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      payment-db:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8081"
      GRPC_ADDR: ":50051"
      DB_DSN: "postgres://postgres:110755@payment-db:5432/payment_db?sslmode=disable"
    ports:
      - "8081:8081"
      - "50051:50051"
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":50052"
      DB_DSN: "postgres://postgres:110755@order-db:5432/order_db?sslmode=disable"
      PAYMENT_GRPC_ADDR: "payment-service:50051"
      HTTP_TIMEOUT_SECONDS: "5"
      STREAM_POLL_INTERVAL_MS: "500"
    ports:
      - "8080:8080"
      - "50052:50052"
    restart: unless-stopped

volumes:
  order-db-data:
  payment-db-data:
